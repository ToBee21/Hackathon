<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloak &amp; Dagger — Offline Vision Ad-Detector</title>
    <style>
      :root {
        --bg: #0b0f12;
        --panel: #11171c;
        --line: #1d272e;
        --ink: #d7e2e8;
        --dim: #74858f;
        --teal: #3fb6a8;
        --warn: #d98b3f;
        --bad: #d96b6b;
        --good: #6bd99b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 13px/1.5 -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 16px;
      }
      h1 { font-size: 15px; margin: 0 0 4px; letter-spacing: 0.02em; }
      .sub { color: var(--dim); margin: 0 0 14px; font-size: 12px; }
      .row { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }
      button {
        background: #16222a;
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 12px;
        cursor: pointer;
        font: inherit;
      }
      button:hover { border-color: var(--teal); }
      button:disabled { opacity: 0.4; cursor: default; }
      .bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
      canvas, #shot { max-width: 360px; border: 1px solid var(--line); border-radius: 6px; display: block; }
      .mono {
        font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
        font-size: 12px;
      }
      #status { color: var(--teal); }
      #verdict { font-size: 18px; font-weight: 600; margin: 4px 0; }
      #verdict.ad { color: var(--bad); }
      #verdict.notad { color: var(--good); }
      #verdict.pending { color: var(--dim); }
      #desc { color: var(--ink); }
      #timings { color: var(--dim); }
      #raw {
        white-space: pre-wrap;
        color: var(--dim);
        max-width: 420px;
        max-height: 220px;
        overflow: auto;
        border-top: 1px dashed var(--line);
        margin-top: 8px;
        padding-top: 8px;
      }
      label.dim { color: var(--dim); font-size: 11px; display: block; margin-bottom: 4px; }
    </style>
  </head>
  <body>
    <h1>Offline Vision Ad-Detector</h1>
    <p class="sub mono">SmolVLM-256M-Instruct · idefics3 · q4f16 · WebGPU · fully local</p>

    <div class="bar">
      <button id="btn-synthetic">Classify synthetic ad banner</button>
      <button id="btn-screenshot">Screenshot active tab &amp; classify</button>
    </div>

    <div class="row">
      <div class="panel">
        <label class="dim">INPUT IMAGE</label>
        <canvas id="canvas" width="360" height="200"></canvas>
        <img id="shot" alt="" style="display:none" />
      </div>

      <div class="panel" style="min-width:300px">
        <label class="dim">STATUS</label>
        <div id="status" class="mono">idle</div>

        <label class="dim" style="margin-top:10px">VERDICT</label>
        <div id="verdict" class="pending mono">—</div>

        <label class="dim" style="margin-top:6px">DESCRIPTION</label>
        <div id="desc" class="mono">—</div>

        <label class="dim" style="margin-top:10px">TIMINGS</label>
        <div id="timings" class="mono">—</div>

        <div id="raw" class="mono"></div>
      </div>
    </div>

    <script type="module" src="./vision.js"></script>
  </body>
</html>
