<!doctype html>
<!--
Customer fear: the host page observes extension UI because the floating panel uses open Shadow DOM.
Data that could leak: status strings, verdict text, aliases or raw model output placed in UI nodes.
Attacker control: MutationObserver and DOM reads from same-page JavaScript.
Promise at risk: open overlay must be treated as presentation only, never a secrecy boundary.
Protection proof: page-dom-leakage and log-redaction security tests.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Shadow DOM Observer</title>
  </head>
  <body>
    <script>
      new MutationObserver(() => {
        for (const node of document.querySelectorAll("*")) {
          if (node.shadowRoot) console.log("observed-shadow-root", node.shadowRoot.textContent)
        }
      }).observe(document.documentElement, { childList: true, subtree: true })
    </script>
  </body>
</html>
