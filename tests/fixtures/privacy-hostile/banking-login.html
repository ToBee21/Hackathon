<!doctype html>
<!--
Customer fear: bank login pages expose credentials or SMS-code context to scanning/logging.
Data that could leak: login labels, password field presence, account and transaction intent.
Attacker control: phishing-like sensitive page content and form structure.
Promise at risk: sensitive-page handling must not retain raw credentials or form input text.
Protection proof: storage-privacy, log-redaction and no-exfiltration security tests.
-->
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bank Secure Login</title>
    <meta
      name="description"
      content="Zaloguj się do bankowości internetowej, aby sprawdzić saldo i historię transakcji."
    />
  </head>
  <body>
    <main>
      <h1>Logowanie do banku</h1>
      <p>Wprowadź login, hasło i kod SMS, aby uzyskać dostęp do rachunku.</p>
      <form>
        <label>
          Login
          <input type="text" name="login" placeholder="Login" />
        </label>
        <label>
          Hasło
          <input type="password" name="password" placeholder="Hasło" />
        </label>
      </form>
    </main>
  </body>
</html>
