<!doctype html>
<!--
Customer fear: ordinary pages with password fields are misclassified as safe and over-scanned.
Data that could leak: mental-health, addiction, debt context and password-field labels.
Attacker control: sensitive narrative text mixed with benign-looking blog markup.
Promise at risk: heuristic scanning cannot be marketed as perfect sensitive-page exclusion.
Protection proof: privacy-claims and no-exfiltration security tests.
-->
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog o zdrowiu  -  wpis premium</title>
    <meta
      name="description"
      content="Osobista historia leczenia depresji, uzależnienia i długów."
    />
  </head>
  <body>
    <article>
      <h1>Jak wyszedłem z depresji i spirali zadłużenia</h1>
      <p>
        Ten wpis opisuje leczenie psychiatryczne, terapię uzależnień i windykację.
      </p>
    </article>

    <section>
      <h2>Strefa klubowa</h2>
      <p>Na zwykłej domenie blogowej pojawia się pole hasła, ale to nie jest bank ani webmail.</p>
      <label>
        Hasło klubowe
        <input type="password" name="club-password" placeholder="Hasło klubowe" />
      </label>
    </section>
  </body>
</html>
